<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Learning Roadmap</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M4 20 C 4 15, 11 15, 11 11 C 11 7, 16 7, 17 5' fill='none' stroke='%23D97757' stroke-width='2' stroke-linecap='round' stroke-dasharray='0.5 4'/><circle cx='4' cy='20' r='2.3' fill='%23788C5D'/><circle cx='11' cy='11' r='2' fill='%23D97757'/><path d='M17 4 L17 12' stroke='%23141413' stroke-width='1.6' stroke-linecap='round'/><path d='M17 4.4 L21.5 6 L17 7.6 Z' fill='%23141413'/></svg>">
<style>
  :root {
    --ivory:    #FAF9F5;
    --slate:    #141413;
    --clay:     #D97757;
    --olive:    #788C5D;
    --gray-150: #F0EEE6;
    --gray-300: #D1CFC5;
    --gray-500: #87867F;
    --gray-700: #3D3D3A;
    --white:    #FFFFFF;
    --serif: ui-serif, Georgia, "Times New Roman", serif;
    --sans:  system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono:  ui-monospace, "SF Mono", Menlo, Monaco, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--sans);
    background: var(--ivory);
    color: var(--slate);
    -webkit-font-smoothing: antialiased;
    padding: 64px 6vw 96px;
  }
  .page { max-width: 1080px; margin: 0 auto; }

  .title-row {
    display: flex;
    align-items: center;
    gap: 13px;
    margin-bottom: 14px;
  }
  .logo { width: 34px; height: 34px; flex-shrink: 0; }
  h1 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 40px;
    letter-spacing: -0.01em;
  }

  /* references / search seeds — collapsible */
  .refs {
    margin-bottom: 22px;
    border: 1px solid var(--gray-300);
    border-radius: 10px;
    background: var(--white);
  }
  .refs-head {
    width: 100%;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.03em;
    color: var(--gray-700);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 12px 16px;
  }
  .refs-head:hover { color: var(--clay); }
  .refs-caret { color: var(--clay); font-size: 11px; width: 12px; display: inline-block; }
  .refs-count { color: var(--gray-500); margin-left: auto; }
  .refs-body { padding: 0 16px 14px; border-top: 1px solid var(--gray-150); }
  .refs-hint { font-size: 12px; color: var(--gray-500); line-height: 1.5; margin: 11px 0 12px; }
  .refs-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .ref-row { display: flex; align-items: center; gap: 8px; position: relative; padding-right: 22px; }
  .ref-text {
    flex: 1;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--gray-700);
    outline: none;
    line-height: 1.5;
    word-break: break-all;
  }
  .ref-link {
    color: var(--gray-700);
    text-decoration: underline;
    text-decoration-color: var(--gray-300);
    text-underline-offset: 3px;
    transition: color 0.12s, text-decoration-color 0.12s;
  }
  .ref-link:hover { color: var(--clay); text-decoration-color: var(--clay); }
  .ref-text:empty::before { content: "url / keyword…"; color: var(--gray-300); }
  .ref-text[data-kind="site"]:empty::before { content: "domain / url…"; color: var(--gray-300); }
  .ref-text[data-kind="keyword"]:empty::before { content: "keyword / buzzword…"; color: var(--gray-300); }
  .ref-row .row-delete { opacity: 0; }
  .ref-row:hover .row-delete { opacity: 0.55; }
  .ref-add { align-self: flex-start; margin-top: -2px; }
  .refs-list .divider:first-child { margin-top: 2px; }

  /* small UI button — matches toolbar, used for in-card adds */
  .mini-btn {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.04em;
    padding: 3px 7px;
    min-height: 28px;
    justify-content: center;
    border: 1px solid transparent;
    background: transparent;
    border-radius: 6px;
    color: var(--gray-500);
    cursor: pointer;
    opacity: 0;
    transition: background 0.12s, border-color 0.12s, color 0.12s, opacity 0.12s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .mini-btn:hover, .mini-btn:focus-visible {
    background: var(--gray-150);
    border-color: var(--gray-300);
    color: var(--gray-700);
    opacity: 1;
  }
  .mini-btn.clay { color: var(--clay); }
  .mini-btn.clay:hover { border-color: var(--clay); background: rgba(217,119,87,0.06); }
  .updated-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 24px;
  }
  .updated {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--gray-500);
  }
  .refresh-date {
    font-size: 18px;
    background: transparent;
    border: none;
    color: var(--clay);
    cursor: pointer;
    padding: 0 3px;
    line-height: 1;
    transition: color 0.12s, transform 0.2s;
  }
  .refresh-date:hover { color: var(--slate); transform: rotate(180deg); }

  /* toolbar */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    justify-content: flex-end;
    align-items: center;
  }
  .btn {
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.04em;
    padding: 7px 12px;
    border: 1px solid var(--gray-300);
    background: var(--white);
    border-radius: 6px;
    color: var(--gray-700);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  .btn:hover { background: var(--gray-150); border-color: var(--gray-500); }
  .btn.primary { border-color: var(--clay); color: var(--clay); }
  .btn.primary:hover { background: rgba(217,119,87,0.08); }
  .btn.dirty {
    border-color: var(--clay);
    color: var(--clay);
    font-weight: 700;
  }
  .btn.dirty:hover { background: rgba(217,119,87,0.08); }
  .btn.ghost { border-color: transparent; background: transparent; }
  .btn.ghost:hover { background: var(--gray-150); }
  .btn.push-right { margin-left: auto; }
  .sync-status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gray-500);
    margin-right: auto;
  }
  .sync-status.warn { color: var(--clay); }
  .token-tools {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-left: auto;
  }
  .token-toggle {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.04em;
    color: var(--gray-500);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 4px 7px;
    cursor: pointer;
    opacity: 0.62;
    transition: opacity 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .token-toggle:hover { opacity: 1; background: var(--gray-150); border-color: var(--gray-300); color: var(--gray-700); }
  .token-panel {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .token-panel[hidden] { display: none; }
  .token-input {
    width: min(340px, 42vw);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 8px;
    border: 1px solid var(--gray-300);
    border-radius: 6px;
    background: var(--white);
    color: var(--gray-700);
    outline: none;
  }
  .token-input:focus { border-color: var(--gray-500); background: var(--gray-150); }
  .icon-btn {
    width: 26px;
    height: 26px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--gray-300);
    background: var(--white);
    border-radius: 6px;
    color: var(--gray-700);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
  }
  .icon-btn:hover { background: var(--gray-150); border-color: var(--gray-500); }

  /* ---- pager ---- */
  .pager {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 26px;
  }
  .pager-tabs { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
  .tab {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.03em;
    padding: 8px 14px;
    border: 1px solid var(--gray-300);
    background: var(--white);
    border-radius: 8px;
    color: var(--gray-700);
    cursor: pointer;
    transition: all 0.12s;
  }
  .tab:hover { background: var(--gray-150); }
  .tab.active { border-color: var(--clay); color: var(--clay); background: rgba(217,119,87,0.06); }
  .tab .tab-idx { color: var(--gray-500); margin-right: 7px; }
  .tab.active .tab-idx { color: var(--clay); }
  .pager-arrow {
    font-size: 18px;
    width: 38px; height: 38px;
    border: 1px solid var(--gray-300);
    background: var(--white);
    border-radius: 8px;
    color: var(--gray-700);
    cursor: pointer;
    line-height: 1;
    flex-shrink: 0;
    transition: all 0.12s;
  }
  .pager-arrow:hover:not(:disabled) { background: var(--gray-150); border-color: var(--gray-500); }
  .pager-arrow:disabled { opacity: 0.3; cursor: default; }

  /* ---- deck / pages ---- */
  .deck { animation: fade 0.18s ease; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  .pair-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 760px) { .pair-grid { grid-template-columns: 1fr; } }

  /* single card per page — centered, readable width */
  .single-stage { max-width: 640px; margin: 0 auto; }

  /* ---- carousel (weekly page) ---- */
  .car-cap {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--gray-500);
    text-align: center;
    margin-bottom: 14px;
  }
  .car-cap b { color: var(--clay); font-weight: 500; }
  .carousel { display: flex; align-items: flex-start; gap: 14px; justify-content: center; }
  .car-stage { flex: 1; max-width: 600px; min-width: 0; }
  .car-arrow {
    font-size: 22px;
    width: 42px; height: 42px;
    flex-shrink: 0;
    border: 1px solid var(--gray-300);
    background: var(--white);
    border-radius: 10px;
    cursor: pointer;
    color: var(--gray-700);
    margin-top: 8px;
    transition: all 0.12s;
  }
  .car-arrow:hover:not(:disabled) { background: var(--gray-150); border-color: var(--gray-500); }
  .car-arrow:disabled { opacity: 0.25; cursor: default; }
  .car-dots { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
  .car-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gray-300);
    border: none;
    cursor: pointer;
    padding: 0;
    transition: all 0.12s;
  }
  .car-dot.active { background: var(--clay); transform: scale(1.25); }
  .week-actions { display: flex; justify-content: center; margin-top: 22px; }
  .car-empty {
    text-align: center;
    color: var(--gray-500);
    font-size: 13.5px;
    line-height: 1.6;
    padding: 56px 20px;
    border: 1px dashed var(--gray-300);
    border-radius: 12px;
  }

  /* ---- domain card ---- */
  .domain {
    border: 1px solid var(--gray-300);
    border-radius: 12px;
    background: var(--white);
    padding: 22px 22px 14px;
    position: relative;
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  .domain:hover { border-color: var(--gray-500); box-shadow: 0 1px 0 rgba(20,20,19,0.03); }

  /* loop-generated dated card — subtly distinct */
  .domain.dated {
    background: linear-gradient(180deg, rgba(217,119,87,0.05), var(--white) 70px);
    border-color: var(--clay);
  }
  .domain.dated .domain-head h2 { color: var(--clay); }

  .domain-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
  }
  .domain-head h2 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 21px;
    letter-spacing: -0.01em;
    outline: none;
    flex: 1;
  }
  .count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gray-500);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .domain-desc {
    font-size: 13.5px;
    color: var(--gray-500);
    line-height: 1.5;
    margin-bottom: 16px;
    outline: none;
  }

  .items { display: flex; flex-direction: column; gap: 16px; }

  /* sub-layer divider — unobtrusive section header inside a card */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px 0 -2px;
    position: relative;
    padding-right: 22px;
  }
  .divider:first-child { margin-top: 0; }
  .divider-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--gray-500);
    white-space: nowrap;
    outline: none;
  }
  .divider-line { height: 1px; background: var(--gray-300); flex: 1; }
  .divider:hover .row-delete { opacity: 0.55; }

  .item {
    display: grid;
    grid-template-columns: 18px 1fr;
    gap: 11px;
    align-items: start;
    position: relative;
    padding-right: 22px;
  }
  .favorite-btn {
    width: 20px;
    height: 22px;
    margin-top: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--gray-300);
    cursor: pointer;
    line-height: 1;
    transition: color 0.12s, transform 0.1s, opacity 0.12s;
  }
  .favorite-btn:hover { color: var(--clay); transform: scale(1.12); }
  .favorite-btn.favorited { color: var(--clay); opacity: 0.9; }
  .favorite-btn svg {
    width: 17px;
    height: 17px;
    display: block;
    stroke: currentColor;
    stroke-width: 2.25;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: transparent;
  }
  .favorite-btn.favorited svg { fill: currentColor; }
  .item-bullet {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid var(--gray-300);
    background: var(--white);
    margin: 5px 0 0 4px;
    display: block;
  }

  /* drag-to-reorder */
  .item-grip {
    position: absolute;
    left: -18px; top: 3px;
    font-size: 12px;
    line-height: 1;
    color: var(--gray-300);
    cursor: grab;
    opacity: 0;
    user-select: none;
    transition: opacity 0.12s, color 0.12s;
  }
  .item:hover .item-grip { opacity: 0.7; }
  .item-grip:hover { color: var(--gray-500); }
  .item-grip:active { cursor: grabbing; }
  .item.dragging { opacity: 0.4; }
  .item.drag-over, .divider.drag-over { background: rgba(217,119,87,0.08); border-radius: 6px; }

  .item-main { min-width: 0; }
  .item-title {
    font-size: 14px;
    line-height: 1.45;
    color: var(--gray-700);
    font-weight: 500;
    outline: none;
  }
  .item.read .item-title { color: var(--gray-500); font-weight: 400; }
  .item-note {
    font-size: 12.5px;
    line-height: 1.5;
    color: var(--gray-500);
    margin-top: 3px;
    outline: none;
  }
  .item-note:empty::before {
    content: "add a note…";
    color: var(--gray-300);
  }
  .item-row2 {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }
  .item-url {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--gray-500);
    outline: none;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
    flex: 1;
    min-width: 0;
  }
  .item-url:empty::before {
    content: "add link…";
    color: var(--gray-300);
  }
  .item-go {
    font-size: 12px;
    color: var(--clay);
    text-decoration: none;
    flex-shrink: 0;
    opacity: 0.75;
    transition: opacity 0.12s, transform 0.1s;
  }
  .item-go:hover { opacity: 1; transform: translate(1px, -1px); }
  .item-go.hidden { display: none; }

  [contenteditable]:focus {
    background: var(--gray-150);
    border-radius: 4px;
    padding: 0 4px;
    margin: 0 -4px;
  }

  .row-delete {
    position: absolute;
    top: -2px; right: -2px;
    opacity: 0;
    transition: opacity 0.12s;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--gray-500);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    line-height: 1;
  }
  .item:hover .row-delete, .domain:hover .domain-delete { opacity: 0.55; }
  .row-delete:hover { opacity: 1 !important; color: var(--clay); }
  .domain-delete {
    position: absolute;
    top: 14px; right: 14px;
    opacity: 0;
  }

  .add-row { display: flex; padding-top: 12px; padding-right: 22px; }
  .add-div {
    width: 100%;
    min-height: 26px;
  }
  .add-in-section {
    width: calc(100% - 25px - 22px);
    align-self: flex-start;
    margin-left: 25px;
    margin-top: -8px;
  }

  @media (max-width: 520px) {
    body { padding: 48px 5vw 80px; }
    .carousel { gap: 6px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="title-row">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M4 20 C 4 15, 11 15, 11 11 C 11 7, 16 7, 17 5" fill="none" stroke="#D97757" stroke-width="2" stroke-linecap="round" stroke-dasharray="0.5 4"/>
      <circle cx="4" cy="20" r="2.3" fill="#788C5D"/>
      <circle cx="11" cy="11" r="2" fill="#D97757"/>
      <path d="M17 4 L17 12" stroke="#141413" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M17 4.4 L21.5 6 L17 7.6 Z" fill="#141413"/>
    </svg>
    <h1>Learning Roadmap</h1>
  </div>

  <div class="updated-row">
    <div class="updated" id="updated" contenteditable="true">Last updated · 2026-06-20</div>
    <button class="refresh-date" id="refresh-date" type="button" title="load latest">↻</button>
    <div class="token-tools">
      <button class="token-toggle" id="set-token" type="button">Token</button>
      <div class="token-panel" id="token-panel" hidden>
        <input class="token-input" id="token-input" type="password" autocomplete="off" placeholder="GitHub token">
        <button class="icon-btn" id="save-token" type="button" title="save token">✓</button>
        <button class="icon-btn" id="clear-token" type="button" title="clear token">×</button>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <span class="sync-status" id="sync-status">Local draft</span>
    <button class="btn" id="save-github">Save</button>
    <button class="btn" id="export">Export JSON</button>
  </div>

  <div class="refs">
    <button class="refs-head" id="refs-toggle" type="button">
      <span class="refs-caret" id="refs-caret">▸</span>
      Source
      <span class="refs-count" id="refs-count"></span>
    </button>
    <div class="refs-body" id="refs-body" hidden>
      <p class="refs-hint">来源优先级与 search seeds(<b>Orgs</b> / <b>Sites</b> / <b>Keywords</b>)——只读,镜像自 <b>learning_roadmap_instruction.md §3</b>;改动请编辑该文件。</p>
      <div class="refs-list" id="refs-list"></div>
    </div>
  </div>

  <div class="pager">
    <button class="pager-arrow" id="prev-page" title="previous page">‹</button>
    <div class="pager-tabs" id="pager-tabs"></div>
    <button class="pager-arrow" id="next-page" title="next page">›</button>
  </div>

  <div class="deck" id="deck"></div>
</div>

<script id="seed" type="application/json">
{
  "updated": "Last updated · 2026-06-20",
  "refsOpen": false,
  "references": [
    {
      "id": "org1",
      "kind": "org",
      "parts": [
        { "label": "OpenAI", "url": "https://developers.openai.com/api/docs/guides/evals" },
        { "label": "Anthropic", "url": "https://www.anthropic.com/engineering/demystifying-evals-for-ai-agents" },
        { "label": "Google DeepMind", "url": "https://deepmind.google/blog/strengthening-our-frontier-safety-framework/" }
      ]
    },
    {
      "id": "org2",
      "kind": "org",
      "parts": [
        { "label": "Meta / Purple Llama", "url": "https://github.com/meta-llama/PurpleLlama" },
        { "label": "UK AISI", "url": "https://inspect.aisi.org.uk/" },
        { "label": "US AISI" }
      ]
    },
    {
      "id": "org3",
      "kind": "org",
      "parts": [
        { "label": "Braintrust", "url": "https://www.braintrust.dev/articles/llm-evaluation-guide" },
        { "label": "Arize", "url": "https://arize.com/blog/" },

    });

  function normalizeData(data) {
    const s = data || {};
    if (!s.weeklies) s.weeklies = [];
    if (!s.domains) s.domains = [];

    if (typeof s.refsOpen !== 'boolean') s.refsOpen = false;
    s.weeklies.forEach((w) => { if (w && w.dated) w.desc = ''; });
    stripStatus(s.domains);
    stripStatus(s.weeklies);

  }

  function clone(obj) {
    return JSON.parse(JSON.stringify(obj));
  }

  function loadLocalDraft() {
    try {
      const stored = localStorage.getItem(KEY);
      if (stored) {
        return normalizeData(JSON.parse(stored));

    return normalizeData(clone(FALLBACK_SEED));
  }

  function dataUrl() {
    const base = location.protocol === 'file:' ? RAW_DATA_URL : DATA_PATH;

  async function loadLatest(opts) {
    opts = opts || {};
    if (opts.silent && localStorage.getItem(DIRTY_KEY)) {
      setStatus('Unsaved local draft', true);
      return;
    }
    if (!opts.silent) setStatus('Loading latest…');
    try {
      const res = await fetch(dataUrl(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      state = normalizeData(await res.json());
      localStorage.setItem(KEY, JSON.stringify(state));
      localStorage.removeItem(DIRTY_KEY);
      setDirty(false);
      weekIdx = 0;
      $updated.textContent = state.updated || '';
      setStatus('Loaded latest');
      renderRefs(); renderDeck();
    } catch (e) {
      if (!opts.silent) setStatus('Load failed: ' + e.message, true);
      else setStatus(localStorage.getItem(DIRTY_KEY) ? 'Unsaved local draft' : 'Local fallback', !!localStorage.getItem(DIRTY_KEY));
    }
  }

  function save() {
    localStorage.setItem(KEY, JSON.stringify(state));
    localStorage.setItem(DIRTY_KEY, '1');
    setDirty(true);
    if (booted) setStatus('Unsaved local changes', true);
  }

  function token() {
    return localStorage.getItem(TOKEN_KEY) || '';
  }

  function showTokenPanel() {
    $tokenInput.value = token();
    $tokenPanel.hidden = false;
    $tokenInput.focus();
  }

  function hideTokenPanel() {
    $tokenPanel.hidden = true;
  }

  function saveToken() {
    const next = $tokenInput.value.trim();
    if (!next) {
      localStorage.removeItem(TOKEN_KEY);
      setStatus('Token cleared');
    } else {
      localStorage.setItem(TOKEN_KEY, next);
      setStatus('Token saved locally');
    }
    hideTokenPanel();
  }

  function clearToken() {
    localStorage.removeItem(TOKEN_KEY);
    $tokenInput.value = '';
    setStatus('Token cleared');
    hideTokenPanel();
  }

  function toBase64(str) {
    const bytes = new TextEncoder().encode(str);
    let out = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      out += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(out);
  }

  async function githubRequest(url, opts) {
    if (!token()) {
      showTokenPanel();
      throw new Error('GitHub token is required');
    }
    const headers = Object.assign({
      'Accept': 'application/vnd.github+json',
      'Authorization': 'Bearer ' + token(),
      'X-GitHub-Api-Version': '2022-11-28'
    }, (opts && opts.headers) || {});
    return fetch(url, Object.assign({}, opts, { headers }));
  }

  async function saveToGithub() {
    setStatus('Saving to GitHub…');
    try {
      const get = await githubRequest(GITHUB_API_URL + '?ref=' + encodeURIComponent(GITHUB_BRANCH));
      if (!get.ok) throw new Error('read failed: HTTP ' + get.status);
      const meta = await get.json();
      const body = {
        message: 'Update roadmap data',
        branch: GITHUB_BRANCH,
        sha: meta.sha,
        content: toBase64(JSON.stringify(state, null, 2) + '\n')
      };
      const put = await githubRequest(GITHUB_API_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!put.ok) throw new Error('save failed: HTTP ' + put.status);
      localStorage.setItem(KEY, JSON.stringify(state));
      localStorage.removeItem(DIRTY_KEY);
      setDirty(false);
      setStatus('Saved to GitHub');
    } catch (e) {
      setStatus(e.message, true);
    }
  }
  function uid() { return 'x' + Math.random().toString(36).slice(2, 9); }
  function findCard(cid) { return state.domains.concat(state.weeklies).find(x => x.id === cid); }
  function sortedWeeklies() {
    return state.weeklies.slice().sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));
  }
  function todayYMD() {
    const dt = new Date();
    return dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0') + '-' + String(dt.getDate()).padStart(2, '0');
  }

  function newItem() {
    return { id: uid(), title: 'New reading — one line.', url: '', note: '' };
  }
  // insert a reading at the END of the section that starts with dividerId
  // (dividerId === null means the leading, divider-less section)
  function addItemInSection(cid, dividerId) {
    const d = findCard(cid);
    if (!d) return;
    let start = 0;
    if (dividerId != null) {
      const di = d.items.findIndex(x => x.id === dividerId);
      if (di < 0) { d.items.push(newItem()); save(); renderDeck(); return; }
      start = di + 1;
    }
    let end = start;
    while (end < d.items.length && d.items[end].type !== 'divider') end++;
    d.items.splice(end, 0, newItem());
    save(); renderDeck();
  }
  function addDivider(cid) {
    const d = findCard(cid);
    if (!d) return;
    d.items.push({ id: uid(), type: 'divider', label: 'New section' });
    save(); renderDeck();
  }
  function deleteItem(cid, iid) {
    const d = findCard(cid);
    if (!d) return;
    d.items = d.items.filter(x => x.id !== iid);
    save(); renderDeck();
  }
  function currentLane(card, iid) {
    let lane = '';
    for (const it of card.items) {
      if (it.id === iid) return lane;
      if (it.type === 'divider') lane = it.label || '';
    }
    return lane;
  }
  function favoriteTarget(card, iid) {
    const lane = currentLane(card, iid);
    if (lane === 'Eval Infra') return { cardId: 'd-eval-general', dividers: ['eg-div-basics', 'eg-div-harness', 'eg-div-ops'] };
    if (lane === 'Eval Infra - Safety') return { cardId: 'd-eval-safety', dividers: ['es-div-basics', 'es-div-threats', 'es-div-gates'] };
    if (lane === 'AI Frontier') return { cardId: 'd-frontier', dividers: ['ft-div-general'] };
    return null;
  }
  function classifyFavorite(target, it) {
    const hay = ((it.title || '') + ' ' + (it.note || '') + ' ' + (it.url || '')).toLowerCase();
    if (target.cardId === 'd-eval-general') {
      if (/(harness|inspect|framework|runner|scorer|dataset|trajectory|agent eval|openai evals|lm-eval)/.test(hay)) return 'eg-div-harness';
      if (/(observability|tracing|monitoring|release|gate|benchmark qa|statistical|human|calibration|signal|noise|quality|ci)/.test(hay)) return 'eg-div-ops';
      return 'eg-div-basics';
    }
    if (target.cardId === 'd-eval-safety') {
      if (/(jailbreak|red.?team|prompt injection|adversary|attack|cyber|bio|dual-use|threat|containment)/.test(hay)) return 'es-div-threats';
      if (/(release|gate|monitoring|preparedness|rsp|responsible scaling|frontier safety|threshold|safeguard|continuous)/.test(hay)) return 'es-div-gates';
      return 'es-div-basics';
    }
    return 'ft-div-general';
  }
  function insertFavorite(targetCard, dividerId, item) {
    const di = targetCard.items.findIndex(x => x.id === dividerId);
    let start = di >= 0 ? di + 1 : targetCard.items.length;
    let end = start;
    while (end < targetCard.items.length && targetCard.items[end].type !== 'divider') end++;
    targetCard.items.splice(end, 0, item);
  }
  function removeFavoriteCopy(targetCard, sourceItem) {
    const before = targetCard.items.length;
    targetCard.items = targetCard.items.filter((x) => {
      if (x.type === 'divider') return true;
      if (x.sourceId && x.sourceId === sourceItem.id) return false;
      if (sourceItem.url && x.url === sourceItem.url) return false;
      return x.title !== sourceItem.title;
    });
    return targetCard.items.length !== before;
  }
  function favoriteItem(cid, iid) {
    const source = findCard(cid);
    const it = source && source.items.find(x => x.id === iid);
    const target = source && it && (it.favoriteTarget
      ? { cardId: it.favoriteTarget }
      : favoriteTarget(source, iid));
    const targetCard = target && state.domains.find(x => x.id === target.cardId);
    if (!source || !it || !targetCard) return;
    if (it.favorited) {
      removeFavoriteCopy(targetCard, it);
      it.favorited = false;
      delete it.favoriteTarget;
      save(); renderDeck();
      return;
    }
    const duplicate = targetCard.items.some(x =>
      x.type !== 'divider' && ((it.url && x.url === it.url) || (x.title === it.title))
    );
    if (!duplicate) {
      insertFavorite(targetCard, classifyFavorite(target, it), {
        id: uid(),
        sourceId: it.id,
        sourceUrl: it.url || '',
        title: it.title || 'Untitled reading',
        url: it.url || '',
        note: it.note || ''
      });
    }
    it.favorited = true;
    it.favoriteTarget = target.cardId;
    save(); renderDeck();
  }
  // move reading `draggedIid` to sit before/after `targetId` within the same card
  function reorderItem(cid, draggedIid, targetId, placeAfter) {
    const d = findCard(cid);
    if (!d || draggedIid === targetId) return;
    const di = d.items.findIndex(x => x.id === draggedIid);
    if (di < 0) return;
    const [moved] = d.items.splice(di, 1);
    const ti = d.items.findIndex(x => x.id === targetId);
    if (ti < 0) d.items.push(moved);
    else d.items.splice(placeAfter ? ti + 1 : ti, 0, moved);
    save(); renderDeck();
  }
  function deleteCard(cid) {
    if (!confirm('Delete this whole card?')) return;
    state.domains = state.domains.filter(x => x.id !== cid);
    state.weeklies = state.weeklies.filter(x => x.id !== cid);
    save(); renderDeck();
  }
  function addWeek() {
    const ymd = todayYMD();
    state.weeklies.unshift({
      id: uid(), dated: true, date: ymd, title: '📅 Weekly · ' + ymd,
      desc: '',
      items: [
        { id: uid(), type: 'divider', label: 'Eval Infra' },
        { id: uid(), type: 'divider', label: 'Eval Infra - Safety' },
        { id: uid(), type: 'divider', label: 'AI Frontier' }
      ]
    });
    pageIdx = PAGES.length - 1; weekIdx = 0;
    save(); renderDeck();
  }

  function exportJSON() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'learning-roadmap.json'; a.click();
    URL.revokeObjectURL(url);
  }

  function bindEdit(el, getter, setter, opts) {
    opts = opts || {};
    el.addEventListener('blur', () => {
      const v = el.textContent.trim();
      const obj = getter();
      if (obj) { setter(obj, v); save(); if (opts.rerender) renderDeck(); }
    });
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !opts.multiline) { e.preventDefault(); el.blur(); }
    });
  }

  // build one domain/weekly card element
  function renderCard(d) {
    const realItems = d.items.filter(i => i.type !== 'divider');
    const card = document.createElement('div');
    card.className = 'domain' + (d.dated ? ' dated' : '');
    card.innerHTML = `
      <button class="row-delete domain-delete" title="delete card">×</button>
      <div class="domain-head">
        <h2 contenteditable="true">${escape(d.title)}</h2>
        <span class="count">${realItems.length} items</span>
      </div>
      <div class="domain-desc" contenteditable="true">${escape(d.desc)}</div>
      <div class="items"></div>
      <div class="add-row">
        <button class="mini-btn add-div" type="button" title="add divider">➕</button>
      </div>
    `;

    bindEdit(card.querySelector('h2'), () => d, (o, v) => o.title = v);
    bindEdit(card.querySelector('.domain-desc'), () => d, (o, v) => o.desc = v);
    card.querySelector('.domain-delete').addEventListener('click', () => deleteCard(d.id));
    card.querySelector('.add-div').addEventListener('click', () => addDivider(d.id));

    const itemsEl = card.querySelector('.items');

    function buildDivider(it) {
      const dv = document.createElement('div');
      dv.className = 'divider';
      dv.innerHTML = `
        <span class="divider-label" contenteditable="true">${escape(it.label || '')}</span>
        <i class="divider-line"></i>
        <button class="row-delete" title="delete">×</button>
      `;
      bindEdit(dv.querySelector('.divider-label'), () => it, (o, v) => o.label = v);
      dv.querySelector('.row-delete').addEventListener('click', () => deleteItem(d.id, it.id));
      // drop onto a divider → move the reading to the top of that section
      dv.addEventListener('dragover', (e) => {
        if (!dragInfo || dragInfo.cardId !== d.id) return;
        e.preventDefault();
        dv.classList.add('drag-over');
      });
      dv.addEventListener('dragleave', () => dv.classList.remove('drag-over'));
      dv.addEventListener('drop', (e) => {
        if (!dragInfo || dragInfo.cardId !== d.id) return;
        e.preventDefault();
        dv.classList.remove('drag-over');
        reorderItem(d.id, dragInfo.iid, it.id, true);
      });
      return dv;
    }
    function buildRow(it) {
      const row = document.createElement('div');
      row.className = 'item';
      const hasUrl = !!(it.url && it.url.trim());
      const heartIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.8 4.7c-2.1-2-5.5-1.7-7.4.6L12 7l-1.4-1.7C8.7 3 5.3 2.7 3.2 4.7.9 6.9.9 10.5 3.1 12.8L12 21l8.9-8.2c2.2-2.3 2.2-5.9-.1-8.1Z"/></svg>';
      const control = d.dated
        ? `<button class="favorite-btn ${it.favorited ? 'favorited' : ''}" type="button" title="${it.favorited ? 'remove from favorites' : 'save to matching collection'}">${heartIcon}</button>`
        : '<span class="item-bullet" aria-hidden="true"></span>';
      row.innerHTML = `
        ${control}
        <div class="item-main">
          <div class="item-title" contenteditable="true">${escape(it.title)}</div>
          <div class="item-note" contenteditable="true">${escape(it.note || '')}</div>
          <div class="item-row2">
            <span class="item-url" contenteditable="true">${escape(it.url || '')}</span>
            <a class="item-go ${hasUrl ? '' : 'hidden'}" target="_blank" rel="noopener" href="${escapeAttr(it.url || '')}">↗</a>
          </div>
        </div>
        <button class="row-delete" title="delete">×</button>
      `;
      const fav = row.querySelector('.favorite-btn');
      if (fav) fav.addEventListener('click', () => favoriteItem(d.id, it.id));
      bindEdit(row.querySelector('.item-title'), () => it, (o, v) => o.title = v);
      bindEdit(row.querySelector('.item-note'), () => it, (o, v) => o.note = v, { multiline: true });
      bindEdit(row.querySelector('.item-url'), () => it, (o, v) => o.url = v, { rerender: true });
      row.querySelector('.row-delete').addEventListener('click', () => deleteItem(d.id, it.id));

      // drag handle — only the grip starts a drag, so text editing stays intact
      const grip = document.createElement('span');
      grip.className = 'item-grip';
      grip.textContent = '⠿';
      grip.title = 'drag to reorder';
      grip.setAttribute('draggable', 'true');
      grip.addEventListener('dragstart', (e) => {
        dragInfo = { cardId: d.id, iid: it.id };
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', it.id);
        if (e.dataTransfer.setDragImage) e.dataTransfer.setDragImage(row, 12, 12);
        row.classList.add('dragging');
      });
      grip.addEventListener('dragend', () => {
        dragInfo = null;
        row.classList.remove('dragging');
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      });
      row.appendChild(grip);

      // drop target — reorder before/after by pointer position
      row.addEventListener('dragover', (e) => {
        if (!dragInfo || dragInfo.cardId !== d.id || dragInfo.iid === it.id) return;
        e.preventDefault();
        row.classList.add('drag-over');
      });
      row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
      row.addEventListener('drop', (e) => {
        if (!dragInfo || dragInfo.cardId !== d.id) return;
        e.preventDefault();
        row.classList.remove('drag-over');
        const rect = row.getBoundingClientRect();
        const after = (e.clientY - rect.top) > rect.height / 2;
        reorderItem(d.id, dragInfo.iid, it.id, after);
      });
      return row;
    }
    function buildAdd(dividerId) {
      const b = document.createElement('button');
      b.className = 'mini-btn add-in-section';
      b.type = 'button';
      b.title = 'add reading';
      b.textContent = '➕';
      b.addEventListener('click', () => addItemInSection(d.id, dividerId));
      return b;
    }

    // group into sections: a leading (divider-less) section, then one per divider
    const hasDivider = d.items.some(i => i.type === 'divider');
    const sections = [];
    let cur = { dividerId: null, divider: null, items: [] };
    d.items.forEach((it) => {
      if (it.type === 'divider') {
        sections.push(cur);
        cur = { dividerId: it.id, divider: it, items: [] };
      } else {
        cur.items.push(it);
      }
    });
    sections.push(cur);

    sections.forEach((sec) => {
      // skip an empty leading section only when the card uses dividers
      if (sec.dividerId === null && sec.items.length === 0 && hasDivider) return;
      if (sec.divider) itemsEl.appendChild(buildDivider(sec.divider));
      sec.items.forEach((it) => itemsEl.appendChild(buildRow(it)));
      itemsEl.appendChild(buildAdd(sec.dividerId));
    });

    return card;
  }

  function renderTabs() {
    $tabs.innerHTML = '';
    PAGES.forEach((p, i) => {
      const t = document.createElement('button');
      t.className = 'tab' + (i === pageIdx ? ' active' : '');
      t.textContent = p.name;
      t.addEventListener('click', () => { pageIdx = i; renderDeck(); });
      $tabs.appendChild(t);
    });
    $prevPage.disabled = pageIdx === 0;
    $nextPage.disabled = pageIdx === PAGES.length - 1;
  }

  function renderWeekly() {
    const weeks = sortedWeeklies();
    if (!weeks.length) {
      const empty = document.createElement('div');
      empty.className = 'car-empty';
      empty.innerHTML = '还没有周卡 — 新建一张,或等 daily/weekly loop 自动生成。';
      $deck.appendChild(empty);
      const acts0 = document.createElement('div');
      acts0.className = 'week-actions';
      const add0 = document.createElement('button');
      add0.className = 'btn primary';
      add0.textContent = '+ Week';
      add0.addEventListener('click', addWeek);
      acts0.appendChild(add0);
      $deck.appendChild(acts0);
      return;
    }
    if (weekIdx >= weeks.length) weekIdx = 0;
    const w = weeks[weekIdx];

    const cap = document.createElement('div');
    cap.className = 'car-cap';
    cap.innerHTML = (weekIdx === 0 ? '<b>最新 latest</b> · ' : '') + escape(w.date || '') + '　(' + (weekIdx + 1) + '/' + weeks.length + ')';
    $deck.appendChild(cap);

    const car = document.createElement('div');
    car.className = 'carousel';
    const prev = document.createElement('button');
    prev.className = 'car-arrow'; prev.textContent = '‹'; prev.disabled = weeks.length <= 1;
    prev.addEventListener('click', () => { weekIdx = (weekIdx - 1 + weeks.length) % weeks.length; renderDeck(); });
    const stage = document.createElement('div');
    stage.className = 'car-stage';
    stage.appendChild(renderCard(w));
    const next = document.createElement('button');
    next.className = 'car-arrow'; next.textContent = '›'; next.disabled = weeks.length <= 1;
    next.addEventListener('click', () => { weekIdx = (weekIdx + 1) % weeks.length; renderDeck(); });
    car.appendChild(prev); car.appendChild(stage); car.appendChild(next);
    $deck.appendChild(car);

    const dots = document.createElement('div');
    dots.className = 'car-dots';
    weeks.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'car-dot' + (i === weekIdx ? ' active' : '');
      dot.addEventListener('click', () => { weekIdx = i; renderDeck(); });
      dots.appendChild(dot);
    });
    $deck.appendChild(dots);

    const acts = document.createElement('div');
    acts.className = 'week-actions';
    const add = document.createElement('button');
    add.className = 'btn primary';
    add.textContent = '+ Week';
    add.addEventListener('click', addWeek);
    acts.appendChild(add);
    $deck.appendChild(acts);
  }

  // read-only: prioritized sources mirror learning_roadmap_instruction.md (§3).
  const REF_KINDS = [{ key: 'org', label: 'Orgs' }, { key: 'site', label: 'Sites' }, { key: 'keyword', label: 'Keywords' }];
  function renderRefs() {
    const refs = state.references || [];
    $refsCaret.textContent = state.refsOpen ? '▾' : '▸';
    $refsCount.textContent = '(' + refs.length + ')';
    $refsBody.hidden = !state.refsOpen;
    $refsList.innerHTML = '';

    REF_KINDS.forEach((k) => {
      const rows = refs.filter(r => r.kind === k.key);
      if (!rows.length) return;
      const dv = document.createElement('div');
      dv.className = 'divider';
      dv.innerHTML = `<span class="divider-label">${escape(k.label)}</span><i class="divider-line"></i>`;
      $refsList.appendChild(dv);

      rows.forEach((r) => {
        const row = document.createElement('div');
        row.className = 'ref-row';
        const text = document.createElement('span');
        text.className = 'ref-text';
        if (Array.isArray(r.parts)) {
          r.parts.forEach((part, i) => {
            if (i > 0) text.appendChild(document.createTextNode(' · '));
            if (part.url) {
              const a = document.createElement('a');
              a.className = 'ref-link';
              a.href = part.url;
              a.target = '_blank';
              a.rel = 'noopener';
              a.textContent = part.label || part.url;
              text.appendChild(a);
            } else {
              text.appendChild(document.createTextNode(part.label || ''));
            }
          });
        } else {
          text.textContent = r.text || '';
        }
        row.appendChild(text);
        $refsList.appendChild(row);
      });
    });
  }

  function renderDeck() {
    renderTabs();
    // restart fade
    $deck.style.animation = 'none';
    void $deck.offsetWidth;
    $deck.style.animation = '';
    $deck.innerHTML = '';

    const page = PAGES[pageIdx];
    if (page.kind === 'single') {
      const wrap = document.createElement('div');
      wrap.className = 'single-stage';
      const d = state.domains.find(x => x.id === page.id);
      if (d) wrap.appendChild(renderCard(d));
      $deck.appendChild(wrap);
    } else {
      renderWeekly();
    }
  }

  function goPage(delta) {
    const n = Math.min(PAGES.length - 1, Math.max(0, pageIdx + delta));
    if (n !== pageIdx) { pageIdx = n; renderDeck(); }
  }

  // top-of-page init (bind once)
  $updated.textContent = state.updated || '';
  bindEdit($updated, () => state, (o, v) => o.updated = v);

  $refsToggle.addEventListener('click', () => { state.refsOpen = !state.refsOpen; save(); renderRefs(); });

  $prevPage.addEventListener('click', () => goPage(-1));
  $nextPage.addEventListener('click', () => goPage(1));
  $export.addEventListener('click', exportJSON);
  $saveGithub.addEventListener('click', saveToGithub);
  $setToken.addEventListener('click', () => {
    if ($tokenPanel.hidden) showTokenPanel();
    else hideTokenPanel();
  });
  $saveToken.addEventListener('click', saveToken);
  $clearToken.addEventListener('click', clearToken);
  $tokenInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') saveToken();
    else if (e.key === 'Escape') hideTokenPanel();
  });
  $refresh.addEventListener('click', () => {
    loadLatest();
  });

  document.addEventListener('keydown', (e) => {
    const ae = document.activeElement;
    if (ae && ae.isContentEditable) return; // don't hijack arrows while editing
    if (e.key === 'ArrowLeft') goPage(-1);
    else if (e.key === 'ArrowRight') goPage(1);
  });

  function escape(s) {
    return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]);
  }
  function escapeAttr(s) {
    return escape(s).replace(/"/g, '&quot;');
  }

  booted = true;
  setDirty(!!localStorage.getItem(DIRTY_KEY));
  setStatus(localStorage.getItem(DIRTY_KEY) ? 'Unsaved local draft' : 'Local draft', !!localStorage.getItem(DIRTY_KEY));
  renderRefs();
  renderDeck();
  loadLatest({ silent: true });
})();
</script>
</body>
</html>
